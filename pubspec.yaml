name: GemMate
description: AI-powered study companion built with Gemma 4
version: 1.3.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  flutter_markdown: ^0.7.0
  intl: ^0.20.2
  image_picker: ^1.1.0
  uuid: ^4.2.1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  permission_handler: ^11.3.0
  provider: ^6.1.2
  flutter_gemma: ^0.13.0
  file_picker: ^8.0.0
  speech_to_text: ^7.0.0
  google_mlkit_text_recognition: ^0.13.0
  flutter_tts: ^4.0.0
  sqlite3_flutter_libs: ^0.5.0   # supplies the SQLite binary so build hook skips GitHub download
  # Feature 8: QR flashcard sharing
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  # Feature 5: PDF + DOCX import + chat
  syncfusion_flutter_pdf: ^33.2.3
  archive: ^3.6.0          # unzip .docx (Word documents are ZIP archives)

flutter:
  uses-material-design: true
  assets:
    - assets/Day.jpg
    - assets/Night.png
    - assets/User.png
